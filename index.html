<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>表格插入空白列</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <div class="title-row">
          <div>
            <h1>表格插入空白列</h1>
            <p>导入 Excel 或 CSV，自动定位“商品重量”列，在旁边新增一列后导出。</p>
          </div>
          <button id="resetButton" class="icon-button" type="button" title="重新开始" aria-label="重新开始">
            ↺
          </button>
        </div>

        <label class="drop-zone" for="fileInput" id="dropZone">
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv,.ods">
          <span class="drop-icon">⇪</span>
          <span class="drop-title">选择或拖入表格文件</span>
          <span class="drop-subtitle">支持 .xlsx、.xls、.csv、.ods</span>
        </label>

        <div class="form-grid" id="controls" hidden>
          <label>
            <span>工作表</span>
            <select id="sheetSelect"></select>
          </label>

          <label>
            <span>固定列：商品重量</span>
            <select id="columnSelect"></select>
          </label>

          <fieldset class="segmented" aria-label="插入位置">
            <legend>插入位置</legend>
            <label>
              <input type="radio" name="insertSide" value="after" checked>
              <span>右侧</span>
            </label>
            <label>
              <input type="radio" name="insertSide" value="before">
              <span>左侧</span>
            </label>
          </fieldset>

          <label>
            <span>新文件名</span>
            <input id="filenameInput" type="text" autocomplete="off">
          </label>
        </div>

        <div class="actions">
          <button id="exportButton" class="primary-button" type="button" disabled>导出表格</button>
          <span id="statusText" role="status"></span>
        </div>
      </section>

      <section class="preview" id="preview" hidden>
        <div class="preview-heading">
          <h2>预览</h2>
          <span id="summaryText"></span>
        </div>
        <div class="table-wrap">
          <table id="previewTable"></table>
        </div>
      </section>
    </main>

    <script src="vendor/xlsx.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
